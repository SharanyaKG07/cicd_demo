name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Use windows-latest as per your lab requirements
    runs-on: windows-latest

    env:
      # Fixes compatibility issues with newer GitHub runners
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    # 1. Pull the code from your repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup the Java environment
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        cache: 'maven'

    # 3. Run the Maven Build
    # Note: No 'working-directory' is needed because pom.xml is in the root
    - name: Build using Maven
      run: mvn clean install