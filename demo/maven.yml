name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    # 1. Pull the code from your repo to the runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Install Java on the GitHub runner
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        cache: 'maven'

    # 3. Run the Maven build
    - name: Build using Maven
      run: mvn clean install
      # CHANGE THIS to your actual folder name if it's different
      working-directory: DEMO